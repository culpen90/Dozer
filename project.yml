name: Dozer
options:
  usesTabs: false
  tabWidth: 4
  createIntermediateGroups: true
  xcodeVersion: 15.0
  deploymentTarget: 11.0
targets:
  Dozer:
    type: application
    platform: macOS
    deploymentTarget: 
      macOS: 11.0
    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig
    sources:
      - Dozer
    postBuildScripts:
      - path: Scripts/LaunchAtLogin.sh
        name: Launch At Login
        runOnlyWhenInstalling: true
      - path: Scripts/SignFrameworks.sh
        name: Sign Frameworks
        runOnlyWhenInstalling: true
      - script: |
          if command -v swiftgen >/dev/null; then
            swiftgen
          elif [ -x /opt/homebrew/bin/swiftgen ]; then
            /opt/homebrew/bin/swiftgen
          elif [ -x /usr/local/bin/swiftgen ]; then
            /usr/local/bin/swiftgen
          else
            echo "warning: SwiftGen not installed; using checked-in generated assets"
          fi
        name: Generate files using SwiftGen
      - path: Scripts/Swiftlint.sh
        name: Swiftlint
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Dozer/Other/Dozer.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: "com.mortennn.Dozer"
        SWIFT_VERSION: 5
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        ENABLE_HARDENED_RUNTIME: true
        MACOSX_DEPLOYMENT_TARGET: 11.0
        VERSIONING_SYSTEM: apple-generic
        CURRENT_PROJECT_VERSION: 30
        ARCHS: "$(ARCHS_STANDARD)"
        ONLY_ACTIVE_ARCH: false
        VALIDATE_WORKSPACE: true
    dependencies:
      - framework: Carthage/Build/LaunchAtLogin.xcframework
        embed: true
        codeSign: true
      - framework: Carthage/Build/Defaults.xcframework
        embed: true
        codeSign: true
      - framework: Carthage/Build/Preferences.xcframework
        embed: true
        codeSign: true
      - framework: Carthage/Build/MASShortcut.xcframework
        embed: true
        codeSign: true
      - framework: Carthage/Build/Sparkle.xcframework
        embed: true
        codeSign: true
schemes:
  Dozer:
    build:
      targets:
        Dozer: all
